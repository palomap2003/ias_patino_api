
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Usuario</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background-color: #fdf6f9;
        }

        .container {
            width: 50%;
            margin: 60px auto;
        }

        .card {
            background-color: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.08);
        }

        h1 {
            color: #b57edc;
            text-align: center;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid #e4d4f4;
            background-color: #faf7fd;
        }

        button {
            background-color: #cdb4db;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-size: 15px;
        }

        button:hover {
            background-color: #b185c9;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #7b6cf6;
            text-decoration: none;
        }

    </style>
</head>
<body>

<div class="container">

    <div class="card">

        <h1>Editar Usuario</h1>

        <form method="POST">

            <input
                type="text"
                name="nombre"
                value="{{ usuario.nombre }}"
                required
            >

            <input
                type="email"
                name="email"
                value="{{ usuario.email }}"
                required
            >

            <button type="submit">
                Guardar Cambios
            </button>

        </form>

        <a href="/">← Volver al inicio</a>

    </div>

</div>

</body>
</html>
